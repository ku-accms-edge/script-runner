# =============================================================================
# CronJob カスタマイズ用パッチ
# =============================================================================
# コンテナイメージやリソース制限，その他のCronJob設定をカスタマイズする場合に使用します。
# =============================================================================

apiVersion: batch/v1
kind: CronJob
metadata:
  name: script-runner
spec:
  # 同時実行ポリシー (Forbid / Allow / Replace)
  concurrencyPolicy: Forbid

  # 成功/失敗したJobの履歴保持数
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      # リトライ回数
      # backoffLimit: 2

      # タイムアウト (10分)
      # activeDeadlineSeconds: 600

      template:
        spec:
          # initContainer のリソース
          initContainers:
            - name: git-clone
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "500m"

          # mainContainer のリソース
          containers:
            - name: script-runner
              # image: ubuntu:24.04
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "1000m"

              # 追加の環境変数
              # env:
              #   - name: PYTHONUNBUFFERED
              #     value: "1"
