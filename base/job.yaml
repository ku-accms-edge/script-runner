apiVersion: batch/v1
kind: Job
metadata:
  name: script-runner
  labels:
    app.kubernetes.io/name: script-runner
    app.kubernetes.io/component: job
spec:
  # Job完了後に自動削除する秒数 (1時間)
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: script-runner
        app.kubernetes.io/component: job
    spec:
      restartPolicy: Never

      # ソースコードを共有するためのボリューム
      volumes:
        - name: workspace
          emptyDir: {}
        - name: entrypoint
          configMap:
            name: entrypoint-script
            defaultMode: 0755

      # Git clone を行う initContainer
      initContainers:
        - name: git-clone
          image: alpine/git:2.52.0
          env:
            - name: GIT_REPO_URL
              valueFrom:
                configMapKeyRef:
                  name: script-runner-config
                  key: GIT_REPO_URL
            - name: GIT_BRANCH
              valueFrom:
                configMapKeyRef:
                  name: script-runner-config
                  key: GIT_BRANCH
                  optional: true
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: git-credentials
                  key: GIT_TOKEN
                  optional: true
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          command:
            - /bin/sh
            - -c
            - |
              set -e

              BRANCH="${GIT_BRANCH:-main}"
              REPO_URL="${GIT_REPO_URL}"

              echo "=========================================="
              echo "Git Clone - Starting"
              echo "=========================================="
              echo "Repository: ${REPO_URL}"
              echo "Branch: ${BRANCH}"
              echo ""

              # トークンがある場合はURLに埋め込む (HTTPS認証)
              if [ -n "${GIT_TOKEN:-}" ]; then
                  echo "🔐 Using authentication token"
                  # https://github.com/... → https://token@github.com/...
                  REPO_URL=$(echo "${REPO_URL}" | sed "s|https://|https://${GIT_TOKEN}@|")
              fi

              echo "📥 Cloning repository..."
              git clone --depth 1 --branch "${BRANCH}" "${REPO_URL}" /workspace

              echo ""
              echo "✅ Clone completed successfully"
              echo ""
              echo "📁 Repository contents:"
              ls -la /workspace
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

      # Python スクリプトを実行するメインコンテナ
      containers:
        - name: script-runner
          image: python:3.14-slim
          workingDir: /workspace
          envFrom:
            - configMapRef:
                name: script-runner-config
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: entrypoint
              mountPath: /scripts
          command:
            - /scripts/entrypoint.sh
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
