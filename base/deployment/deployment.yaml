apiVersion: apps/v1
kind: Deployment
metadata:
  name: script-runner
  labels:
    app.kubernetes.io/name: script-runner
    app.kubernetes.io/component: deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: script-runner
      app.kubernetes.io/component: deployment
  template:
    metadata:
      labels:
        app.kubernetes.io/name: script-runner
        app.kubernetes.io/component: deployment
        serviceSelectorLabel: my-label
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # ソースコードを共有するためのボリューム
      volumes:
        - name: workspace
          emptyDir: {}
        - name: entrypoint
          configMap:
            name: entrypoint-script
            defaultMode: 0755

      # Git clone を行う initContainer
      initContainers:
        - name: git-clone
          image: alpine/git:2.52.0
          env:
            - name: GIT_REPO_URL
              valueFrom:
                configMapKeyRef:
                  name: script-runner-config
                  key: GIT_REPO_URL
            - name: GIT_BRANCH
              valueFrom:
                configMapKeyRef:
                  name: script-runner-config
                  key: GIT_BRANCH
                  optional: true
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: git-credentials
                  key: GIT_TOKEN
                  optional: true
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          command:
            - /bin/sh
            - -c
            - |
              set -e

              BRANCH="${GIT_BRANCH:-main}"
              REPO_URL="${GIT_REPO_URL}"

              echo "=========================================="
              echo "Git Clone - Starting"
              echo "=========================================="
              echo "Repository: ${REPO_URL}"
              echo "Branch: ${BRANCH}"
              echo ""

              if [ -n "${GIT_TOKEN:-}" ]; then
                  echo "🔐 Using authentication token via HTTP header"
                  git config --global credential.helper \
                    '!f() { echo "username=x-access-token"; echo "password='"${GIT_TOKEN}"'"; }; f'
              fi

              echo "📥 Cloning repository..."
              git clone --depth 1 --branch "${BRANCH}" "${REPO_URL}" /workspace

              echo ""
              echo "✅ Clone completed successfully"
              echo ""
              echo "📁 Repository contents:"
              ls -la /workspace
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      # Python スクリプトを実行するメインコンテナ
      containers:
        - name: script-runner
          image: python:3.14-slim
          workingDir: /workspace
          env:
            - name: PIP_TARGET
              value: "/workspace/.pip-packages"
            - name: PYTHONPATH
              value: "/workspace/.pip-packages"
            - name: PIP_CACHE_DIR
              value: "/workspace/.cache/pip"
          envFrom:
            - configMapRef:
                name: script-runner-config
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: entrypoint
              mountPath: /scripts
          command:
            - /scripts/entrypoint.sh
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
