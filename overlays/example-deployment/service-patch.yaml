# =============================================================================
# Service カスタマイズ用パッチ
# =============================================================================
# ポート番号やその他のService設定をカスタマイズする場合に使用します。
#
# containerPort を変更する場合は deployment-patch.yaml も合わせて変更してください。
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: script-runner
spec:
  ports:
    - $patch: replace
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
