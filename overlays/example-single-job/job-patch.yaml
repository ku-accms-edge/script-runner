# =============================================================================
# Job カスタマイズ用パッチ
# =============================================================================
# コンテナイメージやリソース制限，その他のJob設定をカスタマイズする場合に使用します。
# =============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: script-runner
spec:
  # リトライ回数
  # backoffLimit: 2

  # タイムアウト (10分)
  # activeDeadlineSeconds: 600

  template:
    spec:
      # initContainer のリソース
      initContainers:
        - name: git-clone
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

      # mainContainer のリソース
      containers:
        - name: script-runner
          # image: ubuntu:24.04
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"

          # 追加の環境変数
          # env:
          #   - name: PYTHONUNBUFFERED
          #     value: "1"
